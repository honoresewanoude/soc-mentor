---
- name: Deploy SOC Mentor
  hosts: docker_server
  become: yes

  vars:
    app_name: soc-mentor
    app_port: 5001
    image_tar: /tmp/soc-mentor.tar

  tasks:
    - name: Installer Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Démarrer Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Copier image Docker
      copy:
        src: "{{ image_tar }}"
        dest: "{{ image_tar }}"

    - name: Stop container existant
      command: docker rm -f {{ app_name }}
      ignore_errors: yes

    - name: Supprimer ancienne image
      command: docker rmi -f {{ app_name }}:latest
      ignore_errors: yes

    - name: Charger image Docker
      command: docker load -i {{ image_tar }}

    - name: Vérifier image
      command: docker images {{ app_name }}
      register: image_check

    - name: Debug image
      debug:
        msg: "{{ image_check.stdout }}"

    - name: Lancer container
      command: >
        docker run -d
        --name {{ app_name }}
        -p {{ app_port }}:{{ app_port }}
        -e ANTHROPIC_API_KEY={{ lookup('env', 'ANTHROPIC_API_KEY') }}
        --restart unless-stopped
        {{ app_name }}:latest

    - name: Vérifier container
      command: docker ps --filter name={{ app_name }} --format "{{ '{{' }}.Names{{ '}}' }} {{ '{{' }}.Status{{ '}}' }}"
      register: container_status

    - name: Status
      debug:
        msg: "{{ container_status.stdout }}"
