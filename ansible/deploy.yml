---
- name: Deploy SOC Mentor
  hosts: docker_server
  become: yes
  vars:
    app_name: soc-mentor
    app_port: 5001
    image_tar: /tmp/soc-mentor.tar

  tasks:
    - name: Installer Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Démarrer Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Copier image Docker
      copy:
        src: "{{ image_tar }}"
        dest: "{{ image_tar }}"

    - name: Créer dossier secrets
      file:
        path: /opt/soc-mentor
        state: directory
        mode: '0700'

    - name: Copier fichier .env secrets
      copy:
        src: /home/gitlab-runner/.env-soc-mentor
        dest: /opt/soc-mentor/.env
        mode: '0600'
        owner: root
        group: root

    - name: Stop container existant
      command: docker rm -f {{ app_name }}
      ignore_errors: yes

    - name: Supprimer ancienne image
      command: docker rmi -f {{ app_name }}:latest
      ignore_errors: yes

    - name: Charger image Docker
      command: docker load -i {{ image_tar }}

    - name: Nettoyer tar après chargement
      file:
        path: "{{ image_tar }}"
        state: absent

    - name: Lancer container
      command: >
        docker run -d
        --name {{ app_name }}
        --network host
        --env-file /opt/soc-mentor/.env
        --restart unless-stopped
        {{ app_name }}:latest

    - name: Attendre démarrage (5s)
      pause:
        seconds: 5

    - name: Vérifier container
      command: docker ps --filter name={{ app_name }} --format "{{ '{{' }} .Names {{ '}}' }} {{ '{{' }} .Status {{ '}}' }}"
      register: container_status

    - name: Status
      debug:
        msg: "{{ container_status.stdout }}"
