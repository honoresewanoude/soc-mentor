---
- name: Deploy SOC Mentor
  hosts: docker_server
  become: yes

  vars:
    app_name: soc-mentor
    app_port: 5001
    image_tar: /tmp/soc-mentor.tar
    ssh_key_src: /home/gitlab-runner/.ssh/wazuh_id_rsa
    # Reçue depuis --extra-vars dans le pipeline GitLab
    anthropic_api_key: ""

  tasks:
    - name: Installer Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Démarrer Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Copier image Docker
      copy:
        src: "{{ image_tar }}"
        dest: "{{ image_tar }}"

    - name: Créer dossier clé SSH
      file:
        path: /opt/soc-mentor
        state: directory
        mode: '0700'

    - name: Copier clé SSH Wazuh
      copy:
        src: "{{ ssh_key_src }}"
        dest: /opt/soc-mentor/id_rsa
        mode: '0600'
        owner: root
        group: root

    - name: Stop container existant
      command: docker rm -f {{ app_name }}
      ignore_errors: yes

    - name: Supprimer ancienne image
      command: docker rmi -f {{ app_name }}:latest
      ignore_errors: yes

    - name: Charger image Docker
      command: docker load -i {{ image_tar }}

    - name: Nettoyer tar après chargement
      file:
        path: "{{ image_tar }}"
        state: absent

    - name: Lancer container
      command: >
        docker run -d
        --name {{ app_name }}
        --network host
        -v /opt/soc-mentor/id_rsa:/app/id_rsa:ro
        -e ANTHROPIC_API_KEY={{ anthropic_api_key }}
        -e WAZUH_HOST=172.16.1.10
        -e WAZUH_USER=msh
        -e SSH_KEY_PATH=/app/id_rsa
        -e APP_PORT={{ app_port }}
        --restart unless-stopped
        {{ app_name }}:latest

    - name: Attendre démarrage (5s)
      pause:
        seconds: 5

    - name: Vérifier container
      command: docker ps --filter name={{ app_name }} --format "{{'{{'}} .Names {{'}}'}} {{'{{'}} .Status {{'}}'}}"
      register: container_status

    - name: Status
      debug:
        msg: "{{ container_status.stdout }}"
