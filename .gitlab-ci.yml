stages:
  - security
  - build
  - deploy

variables:
  IMAGE_NAME: "soc-mentor"
  APP_PORT: "5001"

# ── STAGE 1 : Analyse sécurité ───────────────────────────────
security_scan:
  stage: security
  script:
    - pip3 install bandit --break-system-packages
    - export PATH=$PATH:/home/gitlab-runner/.local/bin
    - bandit -r app.py parser.py llm_engine.py config.py -f txt -o bandit-report.txt || true
    - cat bandit-report.txt
    - bandit -r app.py parser.py llm_engine.py config.py --severity-level high -f txt
  artifacts:
    paths:
      - bandit-report.txt
    when: always

# ── STAGE 2 : Build image Docker ─────────────────────────────
docker_build:
  stage: build
  script:
    - echo "🛠️ Build Docker (cache activé)..."
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHORT_SHA .
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHORT_SHA $IMAGE_NAME:latest
    - echo "🔍 Vérification dépendances..."
    - docker run --rm $IMAGE_NAME:latest pip freeze | grep -E "anthropic|httpx|paramiko"
    - docker save $IMAGE_NAME:latest -o /tmp/soc-mentor.tar
    - docker image prune -f
    - echo "✅ Image $IMAGE_NAME:latest construite"

# ── STAGE 3 : Déploiement Ansible ────────────────────────────
ansible_deploy:
  stage: deploy
  script:
    - echo "🚀 Déploiement via Ansible..."
    # La clé est passée comme extra-var depuis l'environnement GitLab CI
    - ansible-playbook ansible/deploy.yml -i ansible/inventory.ini
        --extra-vars "anthropic_api_key=$ANTHROPIC_API_KEY"
  after_script:
    - rm -f /tmp/soc-mentor.tar
  only:
    - main
